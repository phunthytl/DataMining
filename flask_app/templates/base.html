<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CineRec{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --gold-glow: rgba(201,168,76,0.35);
      --text: #e8e6df;
      --text-dim: rgba(232,230,223,0.5);
      --text-muted: rgba(232,230,223,0.28);
      --red: #e05252;
      --radius: 10px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.03em;
    }
    .nav-logo span { font-style: normal; color: var(--text); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-account {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .nav-logout {
      font-size: 0.78rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.9rem;
      border-radius: 50px;
      transition: var(--transition);
    }
    .nav-logout:hover { border-color: var(--gold); color: var(--gold); }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      width: 220px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.4rem 1rem 0.4rem 2.2rem;
      font-size: 0.82rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: var(--transition);
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
      font-size: 0.8rem;
    }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: none;
      z-index: 200;
      overflow: hidden;
    }
    .search-dropdown.open { display: block; }
    .search-item {
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--gold-dim); }
    .search-item-title { color: var(--text); }
    .search-item-genre { font-size: 0.72rem; color: var(--text-muted); }

    /* ── FLASH ── */
    .flash { padding: 0.7rem 1.2rem; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 1rem; }
    .flash.error { background: rgba(224,82,82,0.15); border: 1px solid rgba(224,82,82,0.35); color: var(--red); }

    /* ── BTN ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.75rem 1.8rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.03em;
    }
    .btn-gold {
      background: var(--gold);
      color: #0a0a0f;
    }
    .btn-gold:hover { background: #dbb95a; transform: translateY(-1px); box-shadow: 0 8px 30px var(--gold-glow); }
    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  {% if session.get('user_id') %}
  <nav>
    <a href="{{ url_for('home') }}" class="nav-logo"><em>Cine</em><span>Rec</span></a>
    <div class="nav-right">
      {% block nav_center %}{% endblock %}
      <a href="/favorites" class="nav-favorites" style="font-size: 0.82rem; color: var(--text); display: flex; align-items: center; gap: 0.4rem; transition: 0.25s;"><i class="fas fa-heart" style="color: var(--gold); font-size: 1rem;"></i> Yêu thích</a>
      <span class="nav-account">{{ session.get('account', '') }}</span>
      <a href="{{ url_for('logout') }}" class="nav-logout">Đăng xuất</a>
    </div>
  </nav>
  {% endif %}

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
